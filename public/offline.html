<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're offline — RaymonJohns</title>
  <style>
    :root {
      --bg: #e9ecf3;
      --shadow-light: #ffffff;
      --shadow-dark: #b7bfd2;
      --ink: #1b1e2b;
      --ink-muted: #5b6072;
      --accent-blue: #5e78b2;
      --accent-amber: #f4a33c;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      background: var(--bg);
      border-radius: 32px;
      padding: 48px 32px;
      box-shadow: 16px 16px 38px var(--shadow-dark), -12px -12px 32px var(--shadow-light);
    }
    .icon {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      margin: 0 auto 24px;
      display: block;
      box-shadow: 9px 9px 22px var(--shadow-dark), -9px -9px 22px var(--shadow-light);
      object-fit: cover;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 12px;
    }
    p {
      color: var(--ink-muted);
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 28px;
    }
    button {
      appearance: none;
      border: none;
      cursor: pointer;
      background: var(--bg);
      color: var(--ink);
      font-size: 15px;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 999px;
      box-shadow: 5px 5px 12px var(--shadow-dark), -5px -5px 12px var(--shadow-light);
      transition: box-shadow 0.15s ease;
    }
    button:active {
      box-shadow: inset 3px 3px 7px var(--shadow-dark), inset -3px -3px 7px var(--shadow-light);
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent-amber);
      margin-right: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="icon" src="/icons/icon-128x128.png" alt="RaymonJohns" />
    <h1><span class="dot"></span>You're offline</h1>
    <p>This page hasn't been saved for offline use yet. Reconnect to the internet and try again, or revisit a page you've already viewed.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
